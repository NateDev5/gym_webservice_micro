spring:
  application:
    name: enrollment-service
  profiles:
    default: h2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db.migration
    baseline-on-migrate: true

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

services:
  member:
    base-url: ${MEMBER_SERVICE_BASE_URL:http://localhost:8082}
  schedule:
    base-url: ${SCHEDULE_SERVICE_BASE_URL:http://localhost:8083}
  trainer:
    base-url: ${TRAINER_SERVICE_BASE_URL:http://localhost:8084}
