spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: enrollment-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/enrollments/**

            - id: member-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/members/**

            - id: schedule-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/schedules/**

            - id: trainer-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/trainers/**

            - id: enrollment-service-docs
              uri: http://localhost:8081
              predicates:
                - Path=/swagger-docs/enrollment-service
              filters:
                - SetPath=/v3/api-docs

            - id: member-service-docs
              uri: http://localhost:8082
              predicates:
                - Path=/swagger-docs/member-service
              filters:
                - SetPath=/v3/api-docs

            - id: schedule-service-docs
              uri: http://localhost:8083
              predicates:
                - Path=/swagger-docs/schedule-service
              filters:
                - SetPath=/v3/api-docs

            - id: trainer-service-docs
              uri: http://localhost:8084
              predicates:
                - Path=/swagger-docs/trainer-service
              filters:
                - SetPath=/v3/api-docs

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: enrollment-service
        url: /swagger-docs/enrollment-service

      - name: member-service
        url: /swagger-docs/member-service

      - name: schedule-service
        url: /swagger-docs/schedule-service

      - name: trainer-service
        url: /swagger-docs/trainer-service
